<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CloudRAM 3.0 Local</title>
<style>
body{margin:0;background:#f3f0ea;font-family:Arial,sans-serif;color:#1f1f1f}
.wrap{max-width:760px;margin:40px auto;padding:20px}
.card{background:#fff;border-radius:18px;box-shadow:0 10px 30px rgba(0,0,0,.08);padding:28px}
.logo{font-size:40px;font-weight:700;color:#0a6b70}.title{font-size:30px;font-weight:700;margin:8px 0 12px}
.desc{color:#666;font-size:17px;margin-bottom:20px}.status{font-size:20px;font-weight:700;margin:14px 0}
.barbox{height:16px;background:#e5dfd6;border-radius:999px;overflow:hidden}.bar{height:100%;width:0%;background:#0a6b70}
.btns{margin-top:18px;display:flex;gap:12px;flex-wrap:wrap}.btn{border:0;border-radius:12px;padding:14px 18px;font-size:16px;font-weight:700;cursor:pointer}
.primary{background:#0a6b70;color:#fff}.secondary{background:#ddd6cb;color:#222}.log{margin-top:18px;background:#f7f4ee;border-radius:12px;padding:14px;height:230px;overflow:auto;font-family:monospace;font-size:13px}
.row{margin-bottom:8px}.fish{display:none;position:fixed;inset:0;background:linear-gradient(135deg,#ffe08a,#ff9f68,#f94144);color:#210b00;z-index:9999;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:20px}.fish.show{display:flex}.emoji{font-size:120px;animation:wobble .5s infinite alternate}.ftitle{font-size:54px;font-weight:900;margin-top:10px}.ftext{font-size:26px;font-weight:700;max-width:720px;margin-top:10px}@keyframes wobble{from{transform:rotate(-6deg) translateY(0)}to{transform:rotate(6deg) translateY(-8px)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="logo">☁️ CloudRAM 3.0</div>
    <div class="title">Ajout de mémoire vive supplémentaire</div>
    <div class="desc">Version 100 % locale et ultra simple. Clique sur le bouton pour lancer le faux téléchargement.</div>
    <div class="barbox"><div id="bar" class="bar"></div></div>
    <div id="status" class="status">Prêt à lancer l'installation</div>
    <div class="btns">
      <button class="btn primary" onclick="demarrer()">Démarrer l'installation</button>
      <button class="btn secondary" onclick="annuler()">Annuler</button>
    </div>
    <div id="log" class="log"></div>
  </div>
</div>
<div id="fish" class="fish" onclick="fermerPoisson()">
  <div class="emoji">🐟😂</div>
  <div class="ftitle">POISSON D'AVRIL !</div>
  <div class="ftext">Tu n'as pas téléchargé de RAM… tu as juste téléchargé un énorme fou rire.</div>
</div>
<script>
var progression = 0;
var minuterie = null;
var barre = document.getElementById('bar');
var statut = document.getElementById('status');
var journal = document.getElementById('log');
var poisson = document.getElementById('fish');

function ajouterLigne(texte){
  var ligne = document.createElement('div');
  ligne.className = 'row';
  ligne.textContent = '[' + new Date().toLocaleTimeString('fr-FR') + '] ' + texte;
  journal.appendChild(ligne);
  journal.scrollTop = journal.scrollHeight;
}

function rafraichir(){
  barre.style.width = progression + '%';
  if(progression < 100){
    statut.textContent = 'Installation en cours... ' + Math.round(progression) + '%';
  }
}

function demarrer(){
  if(minuterie){ clearInterval(minuterie); }
  progression = 0;
  barre.style.width = '0%';
  journal.innerHTML = '';
  poisson.className = 'fish';
  statut.textContent = 'Préparation des banques mémoire cloud...';
  ajouterLigne('Initialisation de CloudRAM 3.0...');
  ajouterLigne('Connexion au centre de calcul imaginaire...');
  minuterie = setInterval(function(){
    progression = progression + 5;
    if(progression > 100){ progression = 100; }
    rafraichir();
    if(progression === 20){ ajouterLigne('Téléchargement des giga-octets depuis le serveur poisson-01...'); }
    if(progression === 40){ ajouterLigne('Compression quantique de la mémoire en cours...'); }
    if(progression === 60){ ajouterLigne('Allocation des sardines de cache L4...'); }
    if(progression === 80){ ajouterLigne('Stabilisation de la RAM océanique...'); }
    if(progression >= 100){ terminer(); }
  }, 400);
}

function terminer(){
  clearInterval(minuterie);
  minuterie = null;
  statut.textContent = "🐟 Poisson d'avril ! Aucune RAM n'a été ajoutée.";
  ajouterLigne("ALERTE : Poisson d'avril détecté dans le bus mémoire !");
  poisson.className = 'fish show';
}

function annuler(){
  if(minuterie){ clearInterval(minuterie); minuterie = null; }
  progression = 0;
  barre.style.width = '0%';
  statut.textContent = 'Installation annulée';
  ajouterLigne("Installation annulée par l'utilisateur.");
}

function fermerPoisson(){
  poisson.className = 'fish';
}

ajouterLigne("Console prête. Clique sur « Démarrer l'installation ».");
</script>
</body>
</html>
